<div class="flex h-screen bg-slate-100 overflow-hidden">

  <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-2xl">
    <div class="p-6">
      <h2 class="text-xl font-black tracking-tighter uppercase flex items-center gap-2">
        <mat-icon class="text-blue-500">inventory_2</mat-icon>
        Stock Control
      </h2>
    </div>

    <nav class="flex-grow px-4 mt-4 space-y-2">
      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="bg-blue-600 text-white shadow-lg"
         [routerLinkActiveOptions]="{ exact: item.path === '/products' }"
         #rla="routerLinkActive"
         class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all duration-200 group">

        <mat-icon [class.text-blue-400]="rla.isActive">{{ item.icon }}</mat-icon>
        <span class="font-medium">{{ item.label }}</span>
      </a>
    </nav>

    <div class="p-6 border-t border-slate-800 bg-slate-900/50">
      <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1">
        Desenvolvedor
      </p>
      <p class="text-sm font-medium text-slate-300 hover:text-blue-400 transition-colors duration-300">
        Alex Junior Mahia Amaral
      </p>
    </div>
  </aside>

  <main class="flex-grow overflow-y-auto">
    <div class="min-h-full p-4 md:p-8">
      <div class="max-w-7xl mx-auto">

        <header class="mb-8 border-b border-slate-200 pb-4">
          <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">
            Inventory Management
          </h1>
          <p class="text-slate-500">Monitor and manage your products and raw materials in real-time.</p>
        </header>

        <div class="bg-white rounded-2xl shadow-sm p-6">
          <router-outlet></router-outlet>
        </div>

      </div>
    </div>
  </main>

</div>
