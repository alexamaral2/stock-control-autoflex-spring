<div class="bg-white shadow-xl rounded-2xl overflow-hidden p-8">

  <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
    <h2 class="text-2xl font-bold text-slate-800">Material Inventory</h2>

    <div class="flex-1 w-full max-w-md md:mx-4">
      <div class="relative">
        <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</mat-icon>
        <input
          type="text"
          (keyup)="applyFilter($event)"
          placeholder="Search materials..."
          class="w-full pl-10 pr-4 py-2 rounded-full border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition-all text-sm"
        >
      </div>
    </div>

    <button mat-flat-button color="primary" class="!rounded-full px-6 py-2" routerLink="new">
      <mat-icon class="mr-2">add</mat-icon> Register Material
    </button>
  </div>

  <table mat-table [dataSource]="dataSource" class="w-full">
    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef class="text-slate-900 font-semibold py-4"> CODE </th>
      <td mat-cell *matCellDef="let m" class="py-4 text-slate-600 font-mono text-sm"> {{m.code}} </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef class="text-slate-900 font-semibold py-4"> Material Name </th>
      <td mat-cell *matCellDef="let m" class="py-4 text-slate-900 font-medium"> {{m.name}} </td>
    </ng-container>

    <ng-container matColumnDef="quantity">
      <th mat-header-cell *matHeaderCellDef class="text-slate-900 font-semibold py-4 text-center"> Stock Quantity </th>
      <td mat-cell *matCellDef="let m" class="py-4 text-center text-slate-600">
        {{m.quantity}} units
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> </th>
      <td mat-cell *matCellDef="let m" class="text-right py-4">
        <button mat-icon-button color="primary" [routerLink]="['edit', m.id]" (click)="$event.stopPropagation()" class="mr-2 hover:bg-blue-50" matTooltip="Edit Material">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="onDelete($event, m.id!)" class="hover:bg-red-50" matTooltip="Delete Material">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns" class="border-b border-slate-200"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns;"
        (click)="onRowClick(row)"
        class="hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-none cursor-pointer group">
    </tr>
  </table>

  @if (dataSource.filteredData.length === 0) {
    <div class="p-20 text-center text-slate-400">
      <mat-icon class="text-6xl mb-4 opacity-20">inventory</mat-icon>
      <p>No raw materials found in stock.</p>
    </div>
  }

  <mat-paginator
    [pageSize]="7"
    [pageSizeOptions]="[7, 14, 21]"
    showFirstLastButtons
    class="mt-4 border-t border-slate-100">
  </mat-paginator>
</div>
