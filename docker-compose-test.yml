services:
  db_test:
    image: postgres:18-alpine
    container_name: stock-control-db-test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: stock_control_test
    ports:
      - "5434:5432"
    volumes:
      - stock_control_pg_test:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d stock_control_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  api_test:
    build:
      context: ./stock-control-api
      dockerfile: Dockerfile
      target: test
    container_name: stock-control-api-test
    working_dir: /work
    volumes:
      - ./stock-control-api:/work
      - maven-cache:/root/.m2
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://db_test:5432/stock_control_test
      SPRING_DATASOURCE_USERNAME: test
      SPRING_DATASOURCE_PASSWORD: test
      SPRING_FLYWAY_CLEAN_DISABLED: "false"
      SPRING_FLYWAY_LOCATIONS: "classpath:db/migration"
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: WARN
    depends_on:
      db_test:
        condition: service_healthy
    command: ./mvnw clean test

volumes:
  stock_control_pg_test:
  maven-cache: